<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="color-scheme" content="dark" />
<title>ITPP genome browser</title>
<style>
  :root { color-scheme: dark;
    --bg:#0d1117; --panel:#161b22; --line:#30363d; --fg:#e6edf3; --dim:#8b949e;
    --backbone:#3b82f6; --variant:#a855f7; --hit:#e3b341; --edge:#6e7681; --aa:#2ea043; }
  * { box-sizing:border-box; }
  html,body { height:100%; margin:0; }
  body { background:var(--bg); color:var(--fg); display:flex; flex-direction:column;
    font:14px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; }
  header { padding:12px 18px; border-bottom:1px solid var(--line); background:var(--panel);
    display:flex; gap:14px; align-items:center; flex-wrap:wrap; }
  header h1 { font-size:15px; margin:0; font-weight:650; }
  .meta { color:var(--dim); font-size:12px; }
  .controls { display:flex; gap:8px; align-items:center; margin-left:auto; flex-wrap:wrap; }
  select, input, button { background:#0d1117; color:var(--fg); border:1px solid var(--line);
    border-radius:6px; padding:6px 9px; font-size:14px; }
  input#q { font-family:ui-monospace,Menlo,monospace; letter-spacing:2px; text-transform:uppercase; width:210px; }
  button { cursor:pointer; } button:hover { border-color:var(--fg); }
  .legend { display:flex; gap:12px; font-size:12px; color:var(--dim); align-items:center; }
  .legend b { display:inline-block; width:10px; height:10px; border-radius:2px; margin-right:4px; vertical-align:middle; }
  #status { padding:6px 18px; color:var(--dim); font-size:13px; border-bottom:1px solid var(--line);
    display:flex; gap:14px; align-items:center; flex-wrap:wrap; }
  #chips { display:flex; gap:6px; flex-wrap:wrap; }
  .chip { background:#1c2333; border:1px solid var(--line); border-radius:12px; padding:1px 9px;
    font-size:12px; cursor:pointer; color:var(--hit); font-family:ui-monospace,monospace; }
  .chip:hover { border-color:var(--hit); }
  #overview { flex:1 1 auto; position:relative; overflow:hidden; min-height:280px; background:#0b0f16; }
  #ov { width:100%; height:100%; display:block; cursor:grab; }
  #ov.drag { cursor:grabbing; }
  .rule line { stroke:var(--line); } .rule text { fill:var(--dim); font:11px ui-monospace,monospace; }
  .nd { stroke-width:0.6px; }
  .nd.bb { fill:#1b3a63; stroke:var(--backbone); }
  .nd.va { fill:#33204d; stroke:var(--variant); }
  .nd.match { fill:var(--hit); stroke:#fff; stroke-width:1px; }
  .nd.sel { stroke:#fff; stroke-width:1.4px; }
  .eg { fill:none; stroke:var(--edge); stroke-width:0.5px; opacity:.5; }
  #scene text { fill:var(--fg); font:10px ui-monospace,monospace; display:none; }
  #scene.zoom text { display:block; }
  .zoomctl { position:absolute; right:12px; bottom:12px; display:flex; flex-direction:column; gap:6px; }
  .zoomctl button { width:34px; height:34px; font-size:17px; padding:0; }
  #detail { flex:0 0 auto; max-height:44%; overflow:auto; border-top:1px solid var(--line); background:var(--panel); }
  #detail .empty { color:var(--dim); padding:16px; }
  .bar { display:flex; gap:12px; align-items:center; padding:8px 14px; border-bottom:1px solid var(--line); flex-wrap:wrap; }
  .bar .coord { font-family:ui-monospace,monospace; color:var(--hit); font-weight:600; }
  .bar .tag { font-size:12px; color:var(--dim); }
  .bar .strand { border:1px solid var(--line); border-radius:4px; padding:1px 6px; font-size:12px; }
  .tube { overflow-x:auto; padding:4px 8px; }
  .node rect { stroke-width:1.5; cursor:default; } .node text { font:11px ui-monospace,monospace; fill:var(--fg); pointer-events:none; }
  svg text { fill:var(--fg); }
  .node.backbone rect { fill:#132a4d; stroke:var(--backbone); }
  .node.variant rect { fill:#241436; stroke:var(--variant); }
  .node.hit rect { fill:#3a2f0a; stroke:var(--hit); stroke-width:2.5; }
  .edge { fill:none; stroke:var(--edge); stroke-width:1.5; }
  .codons { padding:8px 14px; overflow-x:auto; } .codons table { border-collapse:collapse; font-family:ui-monospace,monospace; }
  .codons td { padding:2px 7px; text-align:center; border:1px solid var(--line); }
  .codons tr.aa td { color:var(--aa); font-weight:700; } .codons .lbl { color:var(--dim); text-align:right; border:none; }
  #tooltip { position:fixed; pointer-events:none; background:#000d; color:#fff; border:1px solid var(--line);
    border-radius:6px; padding:6px 9px; font:12px/1.4 ui-monospace,monospace; z-index:20; display:none; max-width:340px; }
</style>
</head>
<body>
<header>
  <div><h1>ITPP genome browser</h1><div class="meta" id="dsmeta">loading…</div></div>
  <div class="controls">
    <span class="legend"><span><b style="background:#1b3a63;border:1px solid var(--backbone)"></b>backbone</span>
      <span><b style="background:#33204d;border:1px solid var(--variant)"></b>variant</span>
      <span><b style="background:var(--hit)"></b>match</span></span>
    <select id="dataset" title="region"></select>
    <input id="q" placeholder="type ATCG…" autocomplete="off" spellcheck="false" />
    <button id="view3d" title="3D view (planned)">3D</button>
  </div>
</header>
<div id="status"><span id="statusmsg">Fly over the whole region — scroll to zoom, drag to pan. Type a sequence to highlight matches, then click a node to inspect it.</span><span id="chips"></span></div>

<div id="overview">
  <svg id="ov"><g id="rule" class="rule"></g><g id="scene"></g></svg>
  <div class="zoomctl">
    <button id="zin" title="zoom in">+</button>
    <button id="zout" title="zoom out">−</button>
    <button id="zfit" title="fit whole region" style="font-size:12px">fit</button>
  </div>
</div>
<div id="detail"><div class="empty">— click a node in the overview to inspect its local graph, codons and protein —</div></div>
<div id="tooltip"></div>

const GITHUB_RAW = "https://raw.githubusercontent.com/dr-who/itpp/main/database/"; // our project only
const SVGNS = "http://www.w3.org/2000/svg";

function b64ToBytes(b64){ const s=atob(b64), a=new Uint8Array(s.length); for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i); return a; }
function el(ns,name,attrs){ const e=document.createElementNS(ns,name); for(const k in (attrs||{})) e.setAttribute(k,attrs[k]); return e; }
function mkTitle(t){ const x=el(SVGNS,"title"); x.textContent=t; return x; }

const tip=document.getElementById("tooltip");
function showTip(e,t){ tip.textContent=t; tip.style.display="block"; tip.style.left=(e.clientX+14)+"px"; tip.style.top=(e.clientY+14)+"px"; }
function hideTip(){ tip.style.display="none"; }

// ---------- overview (whole-region, pan/zoom) ----------
const LANEH=44, NH=22, PXBP=1;
let browser=null, ov=null, sceneG=null, ruleG=null, over=null;
let view={k:1,tx:0,ty:0}, selected=null, matchSet=new Set();

function buildScene(){
  sceneG.replaceChildren();
  const cy = ov.clientHeight/2;
  // edges
  for(const [a,b] of over.edges){
    const na=over.map.get(a), nb=over.map.get(b); if(!na||!nb) continue;
    const x1=(na.x+na.len)*PXBP, y1=cy+na.lane*LANEH+NH/2, x2=nb.x*PXBP, y2=cy+nb.lane*LANEH+NH/2;
    const mx=(x1+x2)/2;
    sceneG.appendChild(el(SVGNS,"path",{class:"eg",d:`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`}));
  }
  // nodes
  for(const n of over.nodes){
    const x=n.x*PXBP, y=cy+n.lane*LANEH;
    const g=el(SVGNS,"g");
    const r=el(SVGNS,"rect",{class:"nd "+(n.bb?"bb":"va"),x:x,y:y,width:Math.max(n.len*PXBP,1),height:NH,rx:2});
    r.dataset.id=n.id;
    if(matchSet.has(n.id)) r.classList.add("match");
    if(selected===n.id) r.classList.add("sel");
    r.addEventListener("mousemove",e=>showTip(e,`node ${n.id}${n.bb?" · backbone":" · variant"}\nchr6 ≈ ${(over.start+n.x).toLocaleString()}\nlen ${n.len} bp\n${n.seq}`));
    r.addEventListener("mouseleave",hideTip);
    r.addEventListener("click",ev=>{ ev.stopPropagation(); selectNode(n.id); });
    g.appendChild(r);
    const t=el(SVGNS,"text",{x:x+2,y:y+15}); t.textContent=n.seq.slice(0,Math.max(2,Math.round(n.len/2)));
    g.appendChild(t);
    sceneG.appendChild(g);
  }
}
function applyView(){
  sceneG.setAttribute("transform",`translate(${view.tx},${view.ty}) scale(${view.k})`);
  sceneG.classList.toggle("zoom", view.k>=3);
  drawRuler();
}
function drawRuler(){
  ruleG.replaceChildren();
  const W=ov.clientWidth;
  const bpPerPx = 1/(view.k*PXBP);
  const targetTicks=10, rawStep=bpPerPx*(W/targetTicks);
  const pow=Math.pow(10,Math.floor(Math.log10(rawStep)));
  const step=[1,2,5,10].map(m=>m*pow).find(s=>s>=rawStep)||pow;
  const leftBp = over.start + (-view.tx)/(view.k*PXBP);
  let first=Math.ceil(leftBp/step)*step;
  ruleG.appendChild(el(SVGNS,"line",{x1:0,y1:22,x2:W,y2:22}));
  for(let bp=first; ; bp+=step){
    const sx = view.tx + (bp-over.start)*view.k*PXBP;
    if(sx>W) break; if(sx<0) continue;
    ruleG.appendChild(el(SVGNS,"line",{x1:sx,y1:14,x2:sx,y2:22}));
    const t=el(SVGNS,"text",{x:sx+3,y:12}); t.textContent=Math.round(bp).toLocaleString(); ruleG.appendChild(t);
  }
}
function fit(){
  const W=ov.clientWidth, pad=30;
  view.k=(W-2*pad)/Math.max(over.span*PXBP,1);
  view.tx=pad; view.ty=0; applyView();
}
function zoomAt(cx,cy,factor){
  const k2=Math.min(60,Math.max(0.002,view.k*factor));
  view.tx = cx-(cx-view.tx)*(k2/view.k);
  view.ty = cy-(cy-view.ty)*(k2/view.k);
  view.k=k2; applyView();
}
function zoomToNode(id){
  const n=over.map.get(id); if(!n) return;
  const W=ov.clientWidth, H=ov.clientHeight;
  view.k=Math.min(14, Math.max(6, W/ (Math.max(n.len,40)*PXBP*6)));
  const cx=(n.x+n.len/2)*PXBP, cyScene=H/2+n.lane*LANEH+NH/2;
  view.tx=W/2-cx*view.k; view.ty=H/2-cyScene*view.k;
  applyView();
}

// ---------- detail (local tube-map + protein) ----------
function selectNode(id){
  selected=id;
  document.querySelectorAll("#scene .nd.sel").forEach(r=>r.classList.remove("sel"));
  const r=document.querySelector(`#scene .nd[data-id="${id}"]`); if(r) r.classList.add("sel");
  const res=JSON.parse(browser.context(id,0,"+",6,6));
  const d=document.getElementById("detail");
  if(!res.hit){ d.innerHTML=`<div class="empty">node ${id} has no local context</div>`; return; }
  d.replaceChildren(renderDetail(res.hit));
}
function nodeClass(n){ return n.hit?"hit":(n.backbone?"backbone":"variant"); }
function renderDetail(hit){
  const wrap=document.createElement("div");
  const bar=document.createElement("div"); bar.className="bar";
  bar.innerHTML=`<span class="coord">${hit.pos}</span><span class="strand">${hit.strand}</span>`+
    `<span class="tag">node ${hit.node} · ${hit.n_haplotypes} haplotypes</span>`+
    `<span class="tag">protein: <b style="color:var(--aa)">${hit.protein||"—"}</b></span>`;
  wrap.appendChild(bar);
  const tube=document.createElement("div"); tube.className="tube"; tube.appendChild(renderTube(hit)); wrap.appendChild(tube);
  wrap.appendChild(renderCodons(hit));
  return wrap;
}
function renderTube(hit){
  const nodes=hit.nodes, COLW=150, LH=56, NW=108, NHt=32;
  const xs=nodes.map(n=>n.x), minX=Math.min(...xs),maxX=Math.max(...xs);
  const lanes=nodes.map(n=>n.lane), minL=Math.min(0,...lanes),maxL=Math.max(0,...lanes);
  const W=(maxX-minX)*COLW+NW+60, H=(maxL-minL)*LH+NHt+44, cy=22-minL*LH;
  const svg=el(SVGNS,"svg",{width:W,height:H});
  const defs=el(SVGNS,"defs");
  for(const [id,c] of [["ah","var(--edge)"],["ah2","#e3873b"]]){
    const m=el(SVGNS,"marker",{id,markerWidth:7,markerHeight:7,refX:6,refY:3,orient:"auto"});
    m.appendChild(el(SVGNS,"path",{d:"M0,0 L6,3 L0,6 Z",fill:c})); defs.appendChild(m);
  } svg.appendChild(defs);
  const sx=x=>(x-minX)*COLW+20, sy=l=>cy+l*LH;
  const eset=new Set(hit.edges.map(([a,b])=>a+">"+b));
  for(const [a,b] of hit.edges){
    const na=nodes.find(n=>n.id===a), nb=nodes.find(n=>n.id===b); if(!na||!nb) continue;
    const x1=sx(na.x)+NW,y1=sy(na.lane)+NHt/2,x2=sx(nb.x),y2=sy(nb.lane)+NHt/2,mx=(x1+x2)/2;
    const bi=eset.has(b+">"+a);
    const p=el(SVGNS,"path",{class:"edge",d:`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`,"marker-end":bi?"url(#ah2)":"url(#ah)"});
    if(bi) p.setAttribute("stroke","#e3873b");
    p.appendChild(mkTitle(bi?`bidirectional ${a}↔${b} (inversion / cycle)`:`edge ${a}→${b}`)); svg.appendChild(p);
  }
  for(const n of nodes){
    const g=el(SVGNS,"g",{class:"node "+nodeClass(n)});
    const r=el(SVGNS,"rect",{x:sx(n.x),y:sy(n.lane),width:NW,height:NHt,rx:6}); g.appendChild(r);
    const t=el(SVGNS,"text",{x:sx(n.x)+8,y:sy(n.lane)+20}); t.textContent=n.seq.slice(0,12); g.appendChild(t);
    const bl=el(SVGNS,"text",{x:sx(n.x)+NW/2,y:sy(n.lane)+NHt+12,"text-anchor":"middle",fill:"var(--dim)","font-size":10}); bl.textContent=n.len+" bp"; g.appendChild(bl);
    r.addEventListener("mousemove",e=>showTip(e,`node ${n.id}${n.hit?" ◆ match":""}\n${n.pos}\nlen ${n.len} bp\n${n.seq}`));
    r.addEventListener("mouseleave",hideTip);
    r.addEventListener("click",()=>{ if(over.map.has(n.id)) zoomToNode(n.id); selectNode(n.id); });
    svg.appendChild(g);
  }
  return svg;
}
function renderCodons(hit){
  const box=document.createElement("div"); box.className="codons"; if(!hit.codons.length) return box;
  const aa=hit.protein.split(""); let m="<tr class='mer'><td class='lbl'>3-mers</td>", a="<tr class='aa'><td class='lbl'>protein</td>";
  hit.codons.forEach((c,i)=>{ m+=`<td>${c}</td>`; a+=`<td>${aa[i]||""}</td>`; });
  box.innerHTML=`<table>${m}</tr>${a}</tr></table>`; return box;
}

// ---------- search ----------
const statusmsg=document.getElementById("statusmsg"), chipsEl=document.getElementById("chips");
function runSearch(){
  const q=document.getElementById("q").value.trim().toUpperCase().replace(/[^ACGTN]/g,"");
  matchSet=new Set(); chipsEl.replaceChildren();
  if(q.length<2){ statusmsg.textContent="Type ≥2 bases to highlight matches. Scroll=zoom, drag=pan."; buildScene(); applyView(); return; }
  const res=JSON.parse(browser.matches(q,500));
  res.matches.forEach(m=>matchSet.add(m.node));
  statusmsg.textContent=`“${q}” → ${res.n_total} match${res.n_total===1?"":"es"}`+(res.matches.length<res.n_total?` (highlighting first ${res.matches.length})`:"")+(q.length<=4?"  — longer queries are more specific":"");
  res.matches.slice(0,24).forEach(m=>{ const c=document.createElement("span"); c.className="chip"; c.textContent=m.pos; c.title="zoom to "+m.pos; c.onclick=()=>{ zoomToNode(m.node); selectNode(m.node); }; chipsEl.appendChild(c); });
  buildScene(); applyView();
  if(res.matches[0]) zoomToNode(res.matches[0].node);
}

// ---------- boot ----------
async function loadContainer(bytes){
  browser=new wasm_bindgen.GenomeBrowser(bytes);
  over=JSON.parse(browser.overview());
  over.map=new Map(over.nodes.map(n=>[n.id,n]));
  document.getElementById("dsmeta").textContent=`${over.chrom}:${over.start.toLocaleString()} · ${over.span.toLocaleString()} bp · ${over.n_nodes} nodes · ${browser.haplotypes} haplotypes`;
  document.getElementById("dataset").innerHTML=`<option>${browser.region}</option>`;
  buildScene(); fit();
}
function setupInteractions(){
  let drag=null;
  ov.addEventListener("wheel",e=>{ e.preventDefault(); const r=ov.getBoundingClientRect(); zoomAt(e.clientX-r.left,e.clientY-r.top, e.deltaY<0?1.15:1/1.15); },{passive:false});
  ov.addEventListener("mousedown",e=>{ drag={x:e.clientX,y:e.clientY,tx:view.tx,ty:view.ty}; ov.classList.add("drag"); });
  window.addEventListener("mousemove",e=>{ if(!drag)return; view.tx=drag.tx+(e.clientX-drag.x); view.ty=drag.ty+(e.clientY-drag.y); applyView(); });
  window.addEventListener("mouseup",()=>{ drag=null; ov.classList.remove("drag"); });
  window.addEventListener("resize",()=>{ buildScene(); applyView(); });
  const r=()=>{ const b=ov.getBoundingClientRect(); return {cx:b.width/2,cy:b.height/2}; };
  document.getElementById("zin").onclick=()=>{ const c=r(); zoomAt(c.cx,c.cy,1.4); };
  document.getElementById("zout").onclick=()=>{ const c=r(); zoomAt(c.cx,c.cy,1/1.4); };
  document.getElementById("zfit").onclick=fit;
  document.getElementById("view3d").onclick=()=>{ statusmsg.textContent="3D view is planned — the 2D fly-over is live."; };
  let t=null; document.getElementById("q").addEventListener("input",()=>{ clearTimeout(t); t=setTimeout(runSearch,140); });
}

ov=document.getElementById("ov"); sceneG=document.getElementById("scene"); ruleG=document.getElementById("rule");
wasm_bindgen(b64ToBytes(WASM_B64).buffer).then(async ()=>{
  await loadContainer(b64ToBytes(CONTAINER_B64));
  setupInteractions();
  document.getElementById("q").focus();
}).catch(err=>{ statusmsg.textContent="failed to initialise WASM: "+err; });
</script>
